<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>如何培养认真严谨的习惯</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft Yahei", sans-serif;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .container {
            display: flex;
            align-items: center;
            gap: 20px;
            border: 1px solid #eee;
            padding: 15px;
        }
        .img-box img {
            height: 80px;
            display: block;
        }
        .content-box h3 {
            color: #4477aa;
            margin-bottom: 8px;
            font-size: 18px;
        }
        .meta-info {
            font-size: 12px;
            color: #888;
            margin-bottom: 10px;
        }
        .content-box ul {
            list-style: none;
            font-size: 13px;
            line-height: 1.6;
            color: #333;
        }
        .content-box li::before {
            content: "◆";
            color: #4477aa;
            margin-right: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧图片 -->
        <div class="img-box">
            <img src="1777305510277-222.jpg" alt="态度决定一切 细节决定成败">
        </div>
        <!-- 右侧文字内容 -->
        <div class="content-box">
            <h3>如何培养认真严谨的习惯</h3>
            <div class="meta-info">时间:2022年02月21日17时26分 来源:思政教育</div>
            <ul>
                <li>反复确认，做任何事情都要照顾到每一个细节并反复确认，要有一种能在脑子里“虚拟”整个事件过程的能力，确保所有的节点都正常。</li>
                <li>想尽办法努力让不可能变为可能只有用尽全力了，才算是努力。</li>
                <li>结果导向一切以结果为导向，任何事情都是你的名片，还要思考你的结果和过程是否满足所有和你配合的人的需求。</li>
                <li>学会假设了解周围比你强的人，观察他们的做事方法，遇到让自己束手无策的时候，把自己虚拟成他的样子，想想他会怎么做。</li>
            </ul>
        </div>
    </div>
</body>
</html>
