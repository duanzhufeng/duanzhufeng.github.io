<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAE官网 - 首页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            list-style: none;
            text-decoration: none;
            font-family: "宋体", SimSun, serif;
        }
        /* 动态灰色点阵背景 */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        body {
            background-color: #000000;
            color: #ffffff;
            padding-top: 56px;
            min-height: 100vh;
            position: relative;
        }
        /* 顶部导航栏 固定+Flex布局 */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 56px;
            background-color: #000;
            border-bottom: 1px solid #222;
            z-index: 999;
        }
        .nav-container {
            width: 96%;
            max-width: 1440px;
            height: 100%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-left {
            display: flex;
            align-items: center;
            gap: 32px;
        }
        .logo {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
        }
        .nav-menu {
            display: flex;
            align-items: center;
            gap: 28px;
        }
        .menu-item {
            position: relative;
            height: 56px;
            line-height: 56px;
        }
        .menu-item > a {
            color: #cccccc;
            font-size: 14px;
        }
        .menu-item > a:hover {
            color: #fff;
        }
        /* 产品下拉菜单 */
        .product-dropdown {
            display: none;
            position: absolute;
            top: 56px;
            left: 0;
            width: 180px;
            background-color: #111;
            border: 1px solid #333;
            border-radius: 4px;
        }
        .product-dropdown li {
            padding: 10px 16px;
        }
        .product-dropdown li a {
            color: #ccc;
            font-size: 14px;
            display: block;
        }
        .product-dropdown li:hover {
            background-color: #222;
        }
        .product-item:hover .product-dropdown {
            display: block;
        }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .login-btn {
            color: #ccc;
            font-size: 14px;
        }
        .download-btn {
            padding: 6px 16px;
            background-color: #29c870;
            color: #000;
            font-size: 14px;
            border-radius: 3px;
        }
        /* 首屏底部内容 左下文字，右下按钮 */
        .hero-section {
            height: calc(100vh - 56px);
            position: relative;
            z-index: 1;
        }
        .home-bottom-wrap {
            position: absolute;
            bottom: 60px;
            left: 0;
            width: 100%;
            padding: 0 80px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .home-left-text h1 {
            font-size: 48px;
            line-height: 1.2;
            margin-bottom: 8px;
        }
        .home-left-text p {
            font-size: 32px;
            color: #ddd;
        }
        .home-right-buttons {
            display: flex;
            gap: 16px;
        }
        .btn-green {
            padding: 10px 26px;
            background: #29c870;
            color: #000;
            border-radius: 3px;
            font-size: 14px;
            border: none;
            cursor: pointer;
        }
        .btn-gray {
            padding: 10px 26px;
            background: #555966;
            color: #fff;
            border-radius: 3px;
            font-size: 14px;
            border: none;
            cursor: pointer;
        }
        /* 下滑出现的 TRAE Work 区域 */
        .work-section {
            position: relative;
            z-index: 1;
            padding: 80px 20px;
            text-align: center;
        }
        /* 渐变标题 */
        .work-title {
            font-size: 32px;
            margin-bottom: 8px;
        }
        .work-title span {
            background: linear-gradient(90deg, #29c870, #42a5f5);
            -webkit-background-clip: text;
            color: transparent;
        }
        .work-sub {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 30px;
        }
        /* 居中视频 */
        .video-box {
            width: 70%;
            margin: 0 auto 30px;
        }
        .video-box video {
            width: 100%;
            border-radius: 6px;
        }
        /* 输入框区域 */
        .input-wrap {
            width: 70%;
            margin: 0 auto 30px;
            background: #1e1e28;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 12px;
        }
        .input-wrap textarea {
            width: 100%;
            height: 100px;
            background: transparent;
            border: none;
            color: #fff;
            outline: none;
            resize: none;
            font-size: 14px;
        }
        .input-btn-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }
        .left-icons {
            display: flex;
            gap: 12px;
        }
        .icon-btn {
            width: 24px;
            height: 24px;
            background: #333;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
        }
        .run-btn {
            background: #29c870;
            color: #000;
            padding: 3px 10px;
            border-radius: 3px;
            font-size: 13px;
            cursor: pointer;
        }
        /* Flex功能卡片 */
        .card-wrap {
            width: 70%;
            margin: 40px auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }
        .func-card {
            background: #1e1e28;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 16px;
            display: flex;
            gap: 10px;
            text-align: left;
            font-size: 13px;
            color: #ccc;
        }
        .card-icon {
            width: 24px;
            height: 24px;
            background: #333;
            flex-shrink: 0;
        }
        /* 底部渐变条 */
        .bottom-gradient-bar {
            width: 70%;
            height: 40px;
            margin: 0 auto;
            border-radius: 6px;
            background: linear-gradient(90deg, transparent, #29c870, transparent);
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>

    <!-- 顶部导航 -->
    <header>
        <div class="nav-container">
            <div class="nav-left">
                <a href="首页.html" class="logo">TRAE</a >
                <ul class="nav-menu">
                    <li class="menu-item product-item">
                        <a href="#">产品 ▾</a >
                        <ul class="product-dropdown">
                            <li><a href="trae work.html">TRAE Work</a ></li>
                            <li><a href="#">TRAE IDE</a ></li>
                            <li><a href="#">TRAE 插件</a ></li>
                        </ul>
                    </li>
                    <li class="menu-item"><a href="#">企业版</a ></li>
                    <li class="menu-item"><a href="price.html">定价</a ></li>
                    <li class="menu-item"><a href="#">文档</a ></li>
                    <li class="menu-item"><a href="changelog.html">更新日志</a ></li>
                    <li class="menu-item"><a href="#">社区</a ></li>
                    <li class="menu-item"><a href="#">知识库</a ></li>
                </ul>
            </div>
            <div class="nav-right">
                <a href="#" class="login-btn">登录</a >
                <a href="#" class="download-btn">下载中心</a >
            </div>
        </div>
    </header>

    <!-- 首屏区域（下滑前） -->
    <section class="hero-section">
        <div class="home-bottom-wrap">
            <div class="home-left-text">
                <h1>TRAE</h1>
                <p>智能无限，协作无间</p >
            </div>
            <div class="home-right-buttons">
                <button class="btn-green"><li class="menu-item"><a href="trae work.html">打开 TRAE Work 网页版</a ></li></button>
                <button class="btn-gray">下载 TRAE IDE</button>
            </div>
        </div>
    </section>

    <!-- 下滑出现的 TRAE Work 区域 -->
    <section class="work-section">
        <h2 class="work-title">全新 <span>TRAE Work</span> <small>BETA</small></h2>
        <p class="work-sub">不止于码 大有可为</p >

        <div class="video-box">
            <video controls muted>
                <source src="期末作业视频.mp4" type="video/mp4">
                浏览器不支持视频播放
            </video>
        </div>

        
    <!-- 粒子背景JS -->
    <script>
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        function setCanvasSize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        setCanvasSize();
        window.addEventListener('resize', setCanvasSize);

        const particles = [];
        const particleNum = Math.floor(window.innerWidth / 10);
        for (let i = 0; i < particleNum; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 0.5,
                speedX: (Math.random() - 0.5) * 0.3,
                speedY: (Math.random() - 0.5) * 0.3,
                color: `rgba(110, 110, 110, ${Math.random() * 0.5 + 0.2})`
            });
        }
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
                p.x += p.speedX;
                p.y += p.speedY;
                if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
                if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;
            });
            requestAnimationFrame(render);
        }
        render();
    </script>
</body>
</html>
