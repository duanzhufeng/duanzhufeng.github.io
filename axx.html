<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第三章作业-视频播放按钮</title>
    <style>
        /* 1. 给页面添加渐变背景 */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            /* 你可以修改这里的颜色值，换成你喜欢的渐变 */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 视频卡片容器 */
        .video-card {
            width: 300px;
            height: 300px;
            background: #4a2c5c;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* 视频外框 */
        .video-frame {
            width: 220px;
            height: 160px;
            background: #2b1b2e;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 视频内容区域（渐变背景） */
        .video-content {
            width: 180px;
            height: 120px;
            /* 你可以修改这里的颜色 */
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 播放按钮 */
        .play-button {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* 播放箭头（用CSS绘制） */
        .play-arrow {
            width: 0;
            height: 0;
            border-top: 18px solid transparent;
            border-bottom: 18px solid transparent;
            border-left: 30px solid #2b1b2e;
        }

        /* 按钮悬停效果 */
        .play-button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <!-- 视频播放按钮效果 -->
    <div class="video-card">
        <div class="video-frame">
            <div class="video-content">
                <div class="play-button">
                    <div class="play-arrow"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
